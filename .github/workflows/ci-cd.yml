name: MediCheck CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ══════════════════════════════════════════════════════════
  # SERVICE 2 — Bill Analysis API
  # NFR-23: runs on every PR and push to main
  # NFR-25: pytest, black, pylint
  # ══════════════════════════════════════════════════════════
  service2:
    name: Service 2 — Bill Analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/service2-billanalysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install black pylint

      - name: Black formatting check
        run: black --check .

      - name: Pylint
        run: pylint app.py config.py models.py extensions.py routes/ detectors/ services/ --fail-under=7.0 --disable=C0114,C0115,C0116,W0621,C0415

      - name: Run tests
        env:
          FLASK_ENV: development
          DATABASE_URL: sqlite:///test.db
          USE_MOCK_OCR: "true"
          SERVICE3_URL: http://localhost:5002
          SECRET_KEY: ci-test-secret
          MAX_FILE_SIZE_MB: "10"
          MAX_PAGE_COUNT: "20"
        run: pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════════════════
  # SERVICE 3 — RAG & Letter Service
  # Skips if service3-rag folder has no requirements.txt yet
  # ══════════════════════════════════════════════════════════
  service3:
    name: Service 3 — RAG & Letter
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/service3-rag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Service 3 exists
        id: check
        run: |
          if [ -f "requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pip install -r requirements.txt

      - name: Install linting tools
        if: steps.check.outputs.exists == 'true'
        run: pip install black pylint

      - name: Black formatting check
        if: steps.check.outputs.exists == 'true'
        run: black --check .

      - name: Pylint
        if: steps.check.outputs.exists == 'true'
        run: pylint app.py --fail-under=7.0 --disable=C0114,C0115,C0116,W0621,C0415

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        env:
          FLASK_ENV: development
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECRET_KEY: ci-test-secret
          CHROMA_PERSIST_DIR: ./chroma_db_test
        run: pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════════════════
  # SERVICE 1 — React Frontend
  # Skips if service1-frontend folder has no package.json yet
  # ══════════════════════════════════════════════════════════
  service1:
    name: Service 1 — React Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/service1-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Service 1 exists
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm install

      - name: Build
        if: steps.check.outputs.exists == 'true'
        env:
          VITE_API_URL: https://medicheck-bill-analysis.onrender.com
        run: npm run build

  # ══════════════════════════════════════════════════════════
  # DEPLOY — only on push to main after all jobs pass
  # NFR-24: auto-deploy + health checks post-deploy
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy and Health Check
    runs-on: ubuntu-latest
    needs: [service2, service3, service1]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Service 2 to Render
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE2_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Service 2 deploy triggered"

      - name: Deploy Service 3 to Render
        if: vars.SERVICE3_ENABLED == 'true'
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE3_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Service 3 deploy triggered"

      - name: Wait for deployments to complete
        run: sleep 60

      - name: Health check Service 2
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://medicheck-bill-analysis.onrender.com/health)
          if [ "$response" != "200" ]; then
            echo "Service 2 health check FAILED - HTTP $response"
            exit 1
          fi
          echo "Service 2 health check PASSED - HTTP $response"

      - name: Health check Service 3
        if: vars.SERVICE3_ENABLED == 'true'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://medicheck-rag.onrender.com/health)
          if [ "$response" != "200" ]; then
            echo "Service 3 health check FAILED - HTTP $response"
            exit 1
          fi
          echo "Service 3 health check PASSED - HTTP $response"
